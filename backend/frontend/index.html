<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Overwatch Matchmaking</title>

    <style>
        body {
            font-family: Arial;
            background: #1e1e1e;
            color: white;
            padding: 30px;
        }

        button {
            padding: 10px;
            margin-top: 10px;
            cursor: pointer;
        }

        .player {
            background: #333;
            padding: 10px;
            margin-top: 10px;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <h1>Overwatch Matchmaking</h1>

    <button onclick="buscarPlayers()">
        Buscar Jogadores
    </button>

    <button onclick="buscarPartida()">
        Encontrar Partida
    </button>

    <div id="resultado"></div>

    <script>

        async function buscarPlayers() {

            const response = await fetch("/players")

            const data = await response.json()

            let html = "<h2>Jogadores</h2>"

            data.forEach(player => {

                html += `
                    <div class="player">
                        <strong>${player.name}</strong><br>
                        Rank: ${player.rank}<br>
                        Winrate: ${player.winrate}%
                    </div>
                `
            })

            document.getElementById("resultado").innerHTML = html
        }


        async function buscarPartida() {

            const response = await fetch("/matchmaking/Melissa")

            const data = await response.json()

            let html = "<h2>Time Encontrado</h2>"

            data.forEach(player => {

                html += `
                    <div class="player">
                        <strong>${player.name}</strong><br>
                        Rank: ${player.rank}<br>
                        Winrate: ${player.winrate}%
                    </div>
                `
            })

            document.getElementById("resultado").innerHTML = html
        }

    </script>

</body>
</html>
