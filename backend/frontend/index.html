<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>SkillMatchMaker</title>

<style>

body {
    margin: 0;
    font-family: Arial;
    background: #1e1e2f;
    color: white;
}

.sidebar {
    width: 220px;
    height: 100vh;
    background: #141426;
    position: fixed;
    padding: 20px;
}

.header {
    margin-left: 220px;
    height: 80px;
    background: #2a2a3d;
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 0 30px;
    gap: 10px;
}

.profile {
    width: 42px;
    height: 42px;
    background: #777;
    border-radius: 50%;
}

.logout {
    padding: 8px 14px;
    border-radius: 8px;
    cursor: pointer;
    background: transparent;
    border: 1px solid #ff5a5a;
    color: #ff5a5a;
    display: none;
}

.main {
    margin-left: 220px;
    padding: 40px;
    display: flex;
    justify-content: center;
}

.content {
    max-width: 900px;
    width: 100%;
}

h1 {
    font-size: 48px;
}

.auth-buttons {
    margin-top: 10px;
    display: flex;
    gap: 10px;
}

.login-btn, .register-btn {
    padding: 12px 18px;
    border-radius: 10px;
    cursor: pointer;
    font-size: 16px;
    transition: 0.2s;
}

.login-btn:hover,
.register-btn:hover {
    transform: scale(1.03);
}

.login-btn {
    background: transparent;
    border: 1px solid #5a5afc;
    color: #5a5afc;
}

.register-btn {
    background: #5a5afc;
    color: white;
    border: none;
}

.hidden {
    display: none;
}

.match-btn {
    margin-top: 20px;
    padding: 14px 20px;
    background: #5a5afc;
    border: none;
    border-radius: 10px;
    color: white;
    cursor: pointer;
    display: none;
    font-size: 16px;
}

#teamTitle {
    display: none;
    margin-top: 20px;
}

.player {
    background: #2a2a3d;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
}

.modal-bg {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 9999;
}

.modal {
    background: #2a2a3d;
    padding: 30px;
    border-radius: 12px;
    width: 320px;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.modal input,
.modal select {
    width: 85%;
    padding: 10px;
    margin-top: 10px;
    border-radius: 6px;
    border: none;
    text-align: center;
    background: #1e1e2f;
    color: white;
}

.modal button {
    width: 85%;
    margin-top: 12px;
    padding: 12px;
    border-radius: 10px;
    border: none;
    background: #5a5afc;
    color: white;
    cursor: pointer;
}

.close {
    background: transparent !important;
    color: #aaa;
}

</style>
</head>

<body>

<div class="sidebar">
    <h2>SkillMatch</h2>
</div>

<div class="header">
    <button class="logout" id="logoutBtn" onclick="logout()">
        Logout
    </button>

    <div class="profile"></div>
</div>

<div class="main">
    <div class="content">

        <h1>OVERWATCH</h1>

        <div class="auth-buttons" id="authButtons">

            <button class="login-btn" onclick="abrirLogin()">
                Login
            </button>

            <button class="register-btn" onclick="abrirCadastro()">
                Criar Conta
            </button>

        </div>

        <button class="match-btn" id="matchBtn" onclick="buscarPartida()">
            Entrar em Time
        </button>

        <h2 id="teamTitle">Time Encontrado</h2>

        <div id="resultado"></div>

    </div>
</div>

<!-- LOGIN -->
<div class="modal-bg" id="loginModal">

    <div class="modal">

        <h2>Login</h2>

        <input id="login_name" placeholder="Nome">

        <input id="login_password" type="password" placeholder="Senha">

        <button onclick="login()">Entrar</button>

        <button class="close" onclick="fecharModais()">
            Fechar
        </button>

    </div>
</div>

<!-- CADASTRO -->
<div class="modal-bg" id="cadastroModal">

    <div class="modal">

        <h2>Criar Conta</h2>

        <input id="reg_name" placeholder="Nome">

        <input id="reg_password" type="password" placeholder="Senha">

        <select id="reg_rank">
            <option value="">Selecione o Rank</option>
            <option>Bronze</option>
            <option>Prata</option>
            <option>Ouro</option>
            <option>Platina</option>
            <option>Diamante</option>
            <option>Mestre</option>
            <option>Grão-Mestre</option>
        </select>

        <select id="reg_role">
            <option value="">Selecione a Role</option>
            <option>Tanque</option>
            <option>Dano</option>
            <option>Suporte</option>
        </select>

        <input id="reg_winrate" placeholder="Winrate (%)">

        <button onclick="criarConta()">
            Criar Conta
        </button>

        <button class="close" onclick="fecharModais()">
            Fechar
        </button>

    </div>
</div>

<script>

let usuarioLogado = null

window.onload = function() {

    const savedUser = localStorage.getItem("usuario")

    if (savedUser) {

        usuarioLogado = savedUser

        aplicarLoginUI()
    }
}

function aplicarLoginUI() {

    document.getElementById("authButtons").classList.add("hidden")

    document.getElementById("matchBtn").style.display = "block"

    document.getElementById("logoutBtn").style.display = "block"
}

function abrirLogin() {

    document.getElementById("loginModal").style.display = "flex"
}

function abrirCadastro() {

    document.getElementById("cadastroModal").style.display = "flex"
}

function fecharModais() {

    document.getElementById("loginModal").style.display = "none"

    document.getElementById("cadastroModal").style.display = "none"
}

async function login() {

    const name = document.getElementById("login_name").value

    const password = document.getElementById("login_password").value

    try {

        const response = await fetch("/login", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ name, password })
        })

        const data = await response.json()

        if (data.error) {

            alert(data.error)

            return
        }

        usuarioLogado = name.toLowerCase()

        localStorage.setItem("usuario", usuarioLogado)

        aplicarLoginUI()

        fecharModais()

        alert("Login realizado com sucesso!")

    } catch (error) {

        console.error(error)

        alert("Erro ao conectar com o servidor")
    }
}

function logout() {

    usuarioLogado = null

    localStorage.removeItem("usuario")

    document.getElementById("authButtons").classList.remove("hidden")

    document.getElementById("matchBtn").style.display = "none"

    document.getElementById("logoutBtn").style.display = "none"

    document.getElementById("teamTitle").style.display = "none"

    document.getElementById("resultado").innerHTML = ""
}

async function criarConta() {

    const rank = document.getElementById("reg_rank").value

    const role = document.getElementById("reg_role").value

    if (!rank || !role) {

        alert("Preencha rank e role")

        return
    }

    const player = {
        name: document.getElementById("reg_name").value,
        password: document.getElementById("reg_password").value,
        rank: rank,
        role: role,
        winrate: parseInt(document.getElementById("reg_winrate").value)
    }

    try {

        const response = await fetch("/players", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify(player)
        })

        const data = await response.json()

        if (data.error) {

            alert(data.error)

            return
        }

        fecharModais()

        alert("Conta criada com sucesso!")

    } catch (error) {

        console.error(error)

        alert("Erro ao criar conta")
    }
}

async function buscarPartida() {

    const response = await fetch(`/matchmaking/${usuarioLogado}`)

    const data = await response.json()

    document.getElementById("teamTitle").style.display = "block"

    let html = ""

    data.forEach(player => {

        html += `
            <div class="player">
                <strong>${player.name}</strong><br>
                Rank: ${player.rank}<br>
                Winrate: ${player.winrate}%<br>
                Role: ${player.role}
            </div>
        `
    })

    document.getElementById("resultado").innerHTML = html
}

</script>

</body>
</html>
